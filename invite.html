  { keywords: ["飲食","レストラン","カフェ","居酒屋","料理","シェフ","パティシエ"], teamId: 3, note: "安部さん（イタリアン）が在籍。業態が異なれば共存可能" },
  { keywords: ["教育","塾","スクール","講師","家庭教師","習い事","子供"], teamId: 7, note: "若林（ジュニアゴルフ）と連携で富裕層ファミリー向けサービス" },
  { keywords: ["整体","鍼灸","接骨院","整骨院","カイロ","マッサージ","リラクゼーション"], teamId: 6, note: "せいのみわ（ボディケア）と連携。男性向けなら差別化可能" },
  { keywords: ["保育","ベビーシッター","産後","マタニティ","妊婦"], teamId: 6, note: "佐々木（産後ケア）と連携。ママ向けサービスチーム" },
  { keywords: ["車","自動車","修理","板金","コーティング","カー"], teamId: 2, note: "住まいチームの周辺サービスとして連携可能" },
  { keywords: ["旅行","ツアー","旅行代理店","航空券","ホテル"], teamId: 5, note: "山田（ハワイ婚）との連携。イベント旅行の企画" },
  { keywords: ["通訳","翻訳","英語","外国語","語学"], teamId: 4, note: "法人研修チームで語学研修として連携" },
  { keywords: ["コーチング","メンタルコーチ","カウンセラー","心理","セラピスト"], teamId: 6, note: "長澤紀子（キネシオロジー）と連携。心理系サービス" },
  { keywords: ["ペット","トリマー","動物","ドッグ","キャット"], teamId: null, note: "現状チームに組み込みにくい。ペット関連メンバーの追加で新チーム可能" },
];

function search(query) {
  if (!query.trim()) {
    document.getElementById('resultContainer').classList.remove('show');
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  const q = query.toLowerCase().trim();
  const results = [];

  // スロット（募集枠）を検索
  teams.forEach(team => {
    team.slots.forEach(slot => {
      const score = slot.keywords.reduce((s, kw) => {
        if (q.includes(kw.toLowerCase()) || kw.toLowerCase().includes(q)) return s + 10;
        return s;
      }, 0);
      if (score > 0) results.push({ team, slot, score, type: 'slot' });
    });
  });

  // 汎用キーワード検索
  generalKeywords.forEach(gk => {
    const score = gk.keywords.reduce((s, kw) => {
      if (q.includes(kw.toLowerCase()) || kw.toLowerCase().includes(q)) return s + 5;
      return s;
    }, 0);
    if (score > 0) {
      const team = gk.teamId ? teams.find(t => t.id === gk.teamId) : null;
      results.push({ team, note: gk.note, score, type: 'general' });
    }
  });

  // スコア順にソート
  results.sort((a, b) => b.score - a.score);

  // 重複チーム除去
  const seen = new Set();
  const unique = results.filter(r => {
    const key = r.team ? r.team.id + (r.slot ? r.slot.role : '') : r.note;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  renderResults(unique.slice(0, 3), query);
}

function renderResults(results, query) {
  const container = document.getElementById('resultContainer');
  const empty = document.getElementById('emptyState');

  if (results.length === 0) {
    container.innerHTML = `
      <div class="match-card">
        <div class="match-header"><span class="match-team">🤔 「${query}」に直接マッチするチームが見つかりません</span></div>
        <p style="color:#666;margin-top:8px;">ただし、ジャンヌは45名のプロフェッショナルが在籍しています。<br>具体的な業種をもう少し詳しく入力するか、メンバーシップ委員（大城）にご相談ください。</p>
      </div>`;
    container.classList.add('show');
    empty.style.display = 'none';
    return;
  }

  let html = '';
  results.forEach((r, i) => {
    if (!r.team) {
      html += `<div class="match-card"><p style="color:#666;">💡 ${r.note}</p></div>`;
      return;
    }

    const isSlot = r.type === 'slot';
    html += `
      <div class="match-card ${isSlot ? 'new-slot' : ''}">
        <div class="match-header">
          <span class="match-badge">${isSlot ? '🎯 空きポジション' : '💡 関連チーム'}</span>
          ${i === 0 ? '<span style="background:var(--gold);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;">ベストマッチ</span>' : ''}
        </div>
        <div class="match-team">${r.team.icon} ${r.team.name}</div>
        ${isSlot ? `<div class="match-role">ポジション: ${r.slot.role}（${r.slot.priority}）</div>` : ''}
        ${r.note ? `<p style="color:#888;font-size:13px;margin-bottom:12px;">💡 ${r.note}</p>` : ''}

        <div class="pitch-box">
          <div class="pitch-label">📣 ビジター招待トーク</div>
          <div class="pitch-text">
            「${query}をされているんですね！実はジャンヌには<strong>「${r.team.name}」</strong>というパワーチームがあって、${isSlot ? `<strong>${r.slot.role}</strong>のポジションがちょうど空いているんです。` : 'あなたの専門分野が活きるチームがあります。'}
            <br><br>このチームの<strong>${r.team.members.length}名のメンバー全員</strong>のお客さんが、あなたのお客さんにつながる仕組みなんです。例えば…
            <br>🔄 ${r.team.flow.split('→').slice(0,4).join('→')}→ <strong>あなた</strong>
            <br><br>つまり、入った瞬間に${r.team.members.length}名から紹介が来る可能性があります。一度見学に来ませんか？」</div>
        </div>

        <div class="members-box">
          <h4>👥 チームメンバー（${r.team.members.length}名）— あなたの仲間になる人たち</h4>
          ${r.team.members.map(m => `
            <div class="member-row">
              <span class="member-role">${m.role}</span>
              <span class="member-name">${m.name}</span>
              <span style="font-size:11px;color:#999;">${m.detail}</span>
            </div>
          `).join('')}
        </div>

        <div class="flow-box">
          <div class="flow-label">🔄 顧客フロー（1人のお客さんがチーム内を巡る流れ）</div>
          <div class="flow-text">${r.team.flow}</div>
        </div>

        <div class="share-box">
          <button class="share-btn" onclick="copyPitch(this, '${query}', '${r.team.name}', ${r.team.members.length})">📋 トーク文をコピー</button>
          <button class="share-btn" onclick="shareLine('${query}', '${r.team.name}')">💬 LINEで送る</button>
        </div>
      </div>`;
  });

  container.innerHTML = html;
  container.classList.add('show');
  empty.style.display = 'none';
}

function copyPitch(btn, query, teamName, count) {
  const text = `【BNIジャンヌチャプター】\n\n${query}をされている方へ\n\nジャンヌには「${teamName}」というパワーチームがあり、あなたのポジションが空いています。\n\n入った瞬間に${count}名のプロから紹介が来る仕組みです。\n\n▼ 詳細はこちら\nhttps://rerailoffice-max.github.io/bni-jeanne-chapter/\n\n一度見学に来ませんか？`;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ コピーしました！';
    setTimeout(() => btn.textContent = '📋 トーク文をコピー', 2000);
  });
}

function shareLine(query, teamName) {
  const text = encodeURIComponent(`【BNIジャンヌ】${query}の方へ\n「${teamName}」にあなたのポジションが空いています！\nhttps://rerailoffice-max.github.io/bni-jeanne-chapter/`);
  window.open(`https://line.me/R/share?text=${text}`, '_blank');
}

// イベントリスナー
document.getElementById('searchInput').addEventListener('input', (e) => search(e.target.value));
document.querySelectorAll('.tag').forEach(tag => {
  tag.addEventListener('click', () => {
    const q = tag.dataset.q;
    document.getElementById('searchInput').value = q;
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    search(q);
  });
});
</script>
