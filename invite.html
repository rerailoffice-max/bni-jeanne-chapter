<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ジャンヌ ゲスト招待AI</title>
<style>
  :root { --red: #b22234; --gold: #c9a84c; --dark: #1a1a2e; --green: #2d8a4e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f5f5f5; color: var(--dark); }
  .header { background: linear-gradient(135deg, var(--dark), #16213e); color: #fff; text-align: center; padding: 30px 20px; }
  .header h1 { font-size: 22px; margin-bottom: 6px; }
  .header p { color: var(--gold); font-size: 14px; }
  .settings-btn { position: absolute; top: 16px; right: 16px; background: none; border: 1px solid rgba(255,255,255,0.3); color: #aaa; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .settings-btn:hover { border-color: var(--gold); color: var(--gold); }
  .search-area { max-width: 600px; margin: -24px auto 0; padding: 0 20px; position: relative; z-index: 10; }
  .search-box { display: flex; gap: 8px; }
  .search-box input {
    flex: 1; padding: 18px 24px; border: 3px solid var(--red); border-radius: 16px;
    font-size: 18px; outline: none; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }
  .search-box input:focus { border-color: var(--gold); }
  .search-box button {
    background: var(--red); color: #fff; border: none; padding: 0 24px;
    border-radius: 16px; font-size: 16px; cursor: pointer; font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12); transition: background 0.2s; white-space: nowrap;
  }
  .search-box button:hover { background: #8b1a2b; }
  .search-box button:disabled { background: #999; cursor: not-allowed; }
  .tags { max-width: 600px; margin: 16px auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 8px; }
  .tag { background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .tag:hover, .tag.active { background: var(--red); color: #fff; border-color: var(--red); }
  .tag.priority { border-color: var(--red); color: var(--red); font-weight: 600; }
  .tag.priority:hover { background: var(--red); color: #fff; }
  .result { max-width: 600px; margin: 24px auto; padding: 0 20px; }
  .loading { text-align: center; padding: 40px; }
  .loading .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .match-card {
    background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-left: 5px solid var(--green);
  }
  .match-card.highlight { border-left-color: var(--red); }
  .match-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .match-badge { background: var(--green); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .match-card.highlight .match-badge { background: var(--red); }
  .best-badge { background: var(--gold); color: #fff; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
  .match-team { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .match-role { color: var(--red); font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .ai-analysis {
    background: linear-gradient(135deg, #f0f4ff, #eef2ff); border-radius: 12px;
    padding: 16px; margin-bottom: 16px; border: 1px solid #c7d2fe;
  }
  .ai-analysis .ai-label { font-size: 12px; color: #6366f1; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .ai-analysis .ai-text { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  .pitch-box {
    background: linear-gradient(135deg, #fef3c7, #fffbeb); border-radius: 12px;
    padding: 16px; margin-bottom: 16px; border: 1px solid #fde68a;
  }
  .pitch-box .pitch-label { font-size: 12px; color: var(--gold); font-weight: 700; margin-bottom: 6px; }
  .pitch-box .pitch-text { font-size: 15px; line-height: 1.7; white-space: pre-wrap; }
  .members-box { margin-bottom: 16px; }
  .members-box h4 { font-size: 14px; color: #666; margin-bottom: 8px; }
  .member-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .member-row:last-child { border-bottom: none; }
  .member-role { font-size: 12px; color: #888; min-width: 90px; }
  .member-name { font-weight: 600; }
  .flow-box { background: #f0f4ff; border-radius: 12px; padding: 16px; border: 1px solid #bfdbfe; margin-bottom: 16px; }
  .flow-box .flow-label { font-size: 12px; color: #3b82f6; font-weight: 700; margin-bottom: 6px; }
  .flow-box .flow-text { font-size: 13px; line-height: 1.6; }
  .share-box { text-align: center; margin-top: 12px; }
  .share-btn { background: var(--dark); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-size: 14px; cursor: pointer; margin: 4px; }
  .share-btn:hover { background: var(--red); }
  .empty-state { text-align: center; padding: 40px; color: #999; }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 32px; max-width: 440px; width: 90%; }
  .modal h3 { margin-bottom: 12px; }
  .modal p { font-size: 14px; color: #666; margin-bottom: 16px; line-height: 1.6; }
  .modal input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 15px; margin-bottom: 12px; }
  .modal .btn-row { display: flex; gap: 8px; }
  .modal button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 600; }
  .modal .btn-primary { background: var(--red); color: #fff; }
  .modal .btn-secondary { background: #eee; color: #666; }
  .modal a { color: var(--red); }
  @media (max-width: 600px) {
    .search-box input { font-size: 16px; padding: 14px 18px; }
    .search-box button { padding: 0 16px; font-size: 14px; }
    .match-team { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="header" style="position:relative;">
  <button class="settings-btn" onclick="showApiModal()">⚙️ API設定</button>
  <h1>🏰 ジャンヌ ゲスト招待AI</h1>
  <p>ゲストの業種を入力 → AIが最適なパワーチームを提案</p>
</div>

<div class="search-area">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="例: 税理士、ヨガ、動画制作、花屋...">
    <button id="searchBtn" onclick="doSearch()">🔍 AI分析</button>
  </div>
</div>

<div class="tags" id="tagContainer">
  <span class="tag priority" data-q="税理士">🔴 税理士</span>
  <span class="tag priority" data-q="経営コンサルタント">🔴 経営コンサル</span>
  <span class="tag priority" data-q="映像制作・動画編集">🔴 映像制作</span>
  <span class="tag priority" data-q="食品ECプロデューサー">🔴 食品EC</span>
  <span class="tag" data-q="社会保険労務士">社労士</span>
  <span class="tag" data-q="ヨガインストラクター">ヨガ</span>
  <span class="tag" data-q="インテリアデザイナー">インテリア</span>
  <span class="tag" data-q="Webデザイナー・HP制作">Web制作</span>
  <span class="tag" data-q="葬儀屋・終活カウンセラー">葬儀</span>
  <span class="tag" data-q="エステティシャン">エステ</span>
  <span class="tag" data-q="整体師・鍼灸師">整体</span>
  <span class="tag" data-q="旅行代理店">旅行</span>
</div>

<div id="resultContainer" class="result"></div>

<div class="empty-state" id="emptyState">
  <div class="emoji">🤖</div>
  <p>ゲストの業種・カテゴリーを入力して<br>「AI分析」をクリックしてください</p>
  <p style="font-size:13px;color:#bbb;margin-top:8px;">AIが最適なパワーチームと招待トークを生成します</p>
</div>

<!-- API Key モーダル -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h3>🔑 Gemini APIキー設定</h3>
    <p>このツールはGoogle Gemini APIを使います。無料で取得できます。<br>
    <a href="https://aistudio.google.com/apikey" target="_blank">→ APIキーを取得（Google AI Studio）</a></p>
    <input type="password" id="apiKeyInput" placeholder="APIキーを入力...">
    <p style="font-size:12px;color:#999;">※ キーはこのブラウザのみに保存され、外部に送信されません</p>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeApiModal()">キャンセル</button>
      <button class="btn-primary" onclick="saveApiKey()">保存</button>
    </div>
  </div>
</div>

<script>
// チームデータ
const TEAMS = [
  { id:1, name:"相続ワンストップチーム", icon:"⚖️", purpose:"相続発生→手続き→資産処分→片付けまで一気通貫",
    members:[{r:"弁護士",n:"山﨑大志"},{r:"行政書士",n:"柴田駿"},{r:"司法書士",n:"鈴木美穂"},{r:"生命保険",n:"小野瀬顕"},{r:"不動産",n:"武藤正和"},{r:"遺品整理",n:"小池鉄平"},{r:"空き家買取",n:"平塚肇"}],
    flow:"相続発生→山﨑(紛争)→柴田(手続き)→小野瀬(保険)→鈴木(登記)→武藤(売却)→小池(遺品整理)→平塚(空き家買取)",
    vacancies:["税理士(最優先)","葬儀関係(高優先)"]},
  { id:2, name:"住まいの買い替え・リノベチーム", icon:"🏠", purpose:"物件購入→リフォーム→美装→入居まで",
    members:[{r:"マンション売買",n:"岡崎良和"},{r:"注文住宅",n:"川上玲美"},{r:"リフォーム",n:"田中剛"},{r:"ハウスクリーニング",n:"加藤貴博"},{r:"司法書士",n:"鈴木美穂"}],
    flow:"家を買いたい→岡崎(物件探し)→鈴木(登記)→田中(リフォーム)→加藤(クリーニング)",
    vacancies:["インテリアコーディネーター(高優先)","引越し(推奨)","住宅ローンFP(推奨)"]},
  { id:3, name:"店舗開業・集客チーム", icon:"🍽️", purpose:"飲食店・サロンの開業から集客まで丸ごと支援",
    members:[{r:"飲食経営",n:"安部大吾"},{r:"飲食HP",n:"竹内はな"},{r:"LINE構築",n:"下澤一麻"},{r:"デザイン",n:"内川浩"},{r:"写真",n:"糸矢武史"},{r:"Canva",n:"久米里佳"},{r:"印刷物",n:"小桧山隆"}],
    flow:"カフェ開業→安部(経営相談)→内川(ロゴ)→糸矢(写真)→竹内(HP)→小桧山(印刷)→下澤(LINE)→久米(SNS)",
    vacancies:["食品EC/フードPD(最優先)","広告運用(高優先)","店舗設計(推奨)"]},
  { id:4, name:"法人研修・組織開発チーム", icon:"🏢", purpose:"企業の「人を育てる」ニーズを一括カバー",
    members:[{r:"人事戦略",n:"米田智一"},{r:"マナー研修",n:"府川文子"},{r:"AI研修",n:"大城芳樹"},{r:"研修映像",n:"後藤昭人"}],
    flow:"社員教育強化→米田(適性診断)→府川(マナー研修)→大城(AI研修)→後藤(動画化)",
    vacancies:["経営コンサル(最優先)","社労士(高優先)","CSR/ESGコンサル(高優先)"]},
  { id:5, name:"華やかイベント・セレモニーチーム", icon:"🎉", purpose:"結婚式・企業パーティー・式典を彩るプロ集団",
    members:[{r:"ウエディング",n:"山田宗弘"},{r:"フォト",n:"糸矢武史"},{r:"ヘアメイク",n:"髙橋可那子"},{r:"装花",n:"山之内誠"},{r:"MC",n:"MC.Kaori"},{r:"歌手",n:"冬月みぃな"},{r:"ケータリング",n:"安部大吾"},{r:"ギフト菓子",n:"荒井智晃"}],
    flow:"結婚式→山田(プラン)→山之内(装花)→髙橋(ヘアメイク)→糸矢(撮影)→MC.Kaori(司会)→冬月(歌唱)→安部(料理)→荒井(引き出物)",
    vacancies:["ドレス/衣装(推奨)","ジュエリー(推奨)"]},
  { id:6, name:"女性の自分磨き・トータルビューティーチーム", icon:"✨", purpose:"外見→内面→ライフスタイルまで丸ごと支援",
    members:[{r:"美容師",n:"髙橋可那子"},{r:"スタイリスト",n:"新谷芳彦"},{r:"補正下着",n:"長澤良子"},{r:"色彩心理",n:"山崎純代"},{r:"骨盤ケア",n:"佐々木千恵美"},{r:"アロマ",n:"小塚友美"},{r:"ハーブ",n:"山田聖子"},{r:"キネシオロジー",n:"長澤紀子"},{r:"ボディケア",n:"せいのみわ"}],
    flow:"産後リスタート→佐々木(骨盤)→せいの(全身ケア)→長澤良子(補正下着)→髙橋(ヘア)→山崎(カラー診断)→新谷(ファッション)→小塚(アロマ)",
    vacancies:["ヨガ/ピラティス(高優先)","ネイル/エステ(推奨)"]},
  { id:7, name:"経営者の資産形成チーム", icon:"💎", purpose:"経営者の「守り」をワンストップで",
    members:[{r:"IFA",n:"西野匡"},{r:"生命保険",n:"小野瀬顕"},{r:"投資不動産",n:"村田純一"},{r:"法務",n:"山﨑大志"},{r:"ゴルフ",n:"小高駿介"},{r:"ジュニアゴルフ",n:"若林慶太"}],
    flow:"小高のゴルフ生徒(経営者)→小野瀬(保険見直し)→西野(資産運用)→村田(不動産投資)→山﨑(契約書)",
    vacancies:["税理士(最優先)","FP(推奨)"]},
  { id:8, name:"ブランディング制作チーム", icon:"🎨", purpose:"企業・個人の「見せ方」をトータル支援",
    members:[{r:"デザイン",n:"内川浩"},{r:"フォト",n:"糸矢武史"},{r:"PODCAST",n:"トーマス"},{r:"印刷物",n:"小桧山隆"},{r:"展示会ブース",n:"小川真実"},{r:"AI制作",n:"大城芳樹"},{r:"Canva",n:"久米里佳"}],
    flow:"ブランディング→内川(ロゴ)→糸矢(写真)→小桧山(パンフ印刷)→小川(展示会ブース)→大城(AI動画)→トーマス(PODCAST)",
    vacancies:["映像制作(最優先)","Web制作(高優先)","コピーライター(推奨)","PR/広報(推奨)"]}
];

function getApiKey() { return localStorage.getItem('gemini_api_key'); }
function showApiModal() { document.getElementById('apiModal').classList.add('show'); document.getElementById('apiKeyInput').value = getApiKey() || ''; }
function closeApiModal() { document.getElementById('apiModal').classList.remove('show'); }
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) { localStorage.setItem('gemini_api_key', key); closeApiModal(); }
}

// 起動時にAPIキーチェック
window.addEventListener('load', () => { if (!getApiKey()) showApiModal(); });

async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  const apiKey = getApiKey();
  if (!apiKey) { showApiModal(); return; }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '分析中...';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultContainer').innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px;color:#999;">AIが最適なチームを分析中...</p></div>';

  const teamsInfo = TEAMS.map(t =>
    `チーム${t.id}「${t.name}」: ${t.purpose}\nメンバー: ${t.members.map(m=>m.r+'='+m.n).join(', ')}\n顧客フロー: ${t.flow}\n空きポジション: ${t.vacancies.join(', ')}`
  ).join('\n\n');

  const prompt = `あなたはBNIジャンヌチャプターのメンバーシップ委員のAIアシスタントです。

以下の8つのパワーチームがあります:
${teamsInfo}

ゲスト候補の業種: 「${query}」

以下のJSON形式で回答してください。JSONのみを出力し、他のテキストは不要です:
{
  "bestTeam": チームID(1-8の数字),
  "position": "このゲストがチーム内で担う役割名",
  "isVacancy": true/false(空きポジションに該当するか),
  "priority": "最優先/高優先/推奨/通常",
  "analysis": "なぜこのチームが最適かの分析（3-4文、日本語）。具体的にどのメンバーのお客さんがこのゲストのお客さんになるか、逆にこのゲストのお客さんがどのメンバーに流れるかを説明。",
  "pitch": "ビジター招待トーク（日本語、150-200文字）。「あなたが入ると○○さんと△△さんのお客さんが直接あなたのお客さんになります」という具体的な訴求。",
  "customerFlow": "このゲストを含めた新しい顧客フロー例（→で繋ぐ）",
  "secondTeam": チームID or null(サブチームがあれば),
  "secondReason": "サブチームの理由（あれば）"
}`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API Error');
    }

    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const jsonStr = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
    const result = JSON.parse(jsonStr);
    renderAIResult(result, query);
  } catch (e) {
    document.getElementById('resultContainer').innerHTML = `
      <div class="match-card">
        <p style="color:var(--red);">⚠️ エラー: ${e.message}</p>
        <p style="color:#666;margin-top:8px;">APIキーを確認するか、もう一度お試しください。</p>
        <button class="share-btn" onclick="showApiModal()" style="margin-top:12px;">⚙️ APIキー設定</button>
      </div>`;
  }

  btn.disabled = false; btn.textContent = '🔍 AI分析';
}

function renderAIResult(r, query) {
  const team = TEAMS.find(t => t.id === r.bestTeam);
  if (!team) { document.getElementById('resultContainer').innerHTML = '<p>チームが見つかりません</p>'; return; }

  let html = `
    <div class="match-card highlight">
      <div class="match-header">
        <span class="match-badge">${r.isVacancy ? '🎯 空きポジション' : '💡 最適チーム'}</span>
        <span class="best-badge">✨ AIベストマッチ</span>
        ${r.priority === '最優先' ? '<span style="background:var(--red);color:#fff;padding:3px 8px;border-radius:8px;font-size:11px;">🔴 最優先募集中</span>' : ''}
      </div>
      <div class="match-team">${team.icon} ${team.name}</div>
      <div class="match-role">ポジション: ${r.position}</div>

      <div class="ai-analysis">
        <div class="ai-label">🤖 AI分析</div>
        <div class="ai-text">${r.analysis}</div>
      </div>

      <div class="pitch-box">
        <div class="pitch-label">📣 ビジター招待トーク（そのまま使えます）</div>
        <div class="pitch-text">${r.pitch}</div>
      </div>

      <div class="flow-box">
        <div class="flow-label">🔄 あなたを含めた新しい顧客フロー</div>
        <div class="flow-text">${r.customerFlow}</div>
      </div>

      <div class="members-box">
        <h4>👥 チームメンバー（${team.members.length}名）</h4>
        ${team.members.map(m => `<div class="member-row"><span class="member-role">${m.r}</span><span class="member-name">${m.n}</span></div>`).join('')}
        <div class="member-row" style="background:#fff5f5;border-radius:8px;padding:8px;margin-top:4px;">
          <span class="member-role" style="color:var(--red);font-weight:700;">${r.position}</span>
          <span class="member-name" style="color:var(--red);">← ゲストのポジション</span>
        </div>
      </div>

      <div class="share-box">
        <button class="share-btn" onclick="copyText(this, \`${r.pitch.replace(/`/g,"'")}\`)">📋 トークをコピー</button>
        <button class="share-btn" onclick="shareLine(\`${query}\`, \`${team.name}\`)">💬 LINEで送る</button>
      </div>
    </div>`;

  // サブチーム
  if (r.secondTeam) {
    const sub = TEAMS.find(t => t.id === r.secondTeam);
    if (sub) {
      html += `
        <div class="match-card">
          <div class="match-header"><span class="match-badge" style="background:#6366f1;">🔗 サブチーム</span></div>
          <div class="match-team">${sub.icon} ${sub.name}</div>
          <p style="color:#666;margin-top:8px;">${r.secondReason || ''}</p>
          <div class="members-box" style="margin-top:12px;">
            <h4>👥 メンバー</h4>
            ${sub.members.map(m => `<div class="member-row"><span class="member-role">${m.r}</span><span class="member-name">${m.n}</span></div>`).join('')}
          </div>
        </div>`;
    }
  }

  document.getElementById('resultContainer').innerHTML = html;
}

function copyText(btn, text) {
  navigator.clipboard.writeText(`【BNIジャンヌチャプター】\n\n${text}\n\n▼ 詳細\nhttps://rerailoffice-max.github.io/bni-jeanne-chapter/`).then(() => {
    btn.textContent = '✅ コピー完了'; setTimeout(() => btn.textContent = '📋 トークをコピー', 2000);
  });
}
function shareLine(query, teamName) {
  const t = encodeURIComponent(`【BNIジャンヌ】${query}の方へ\n「${teamName}」にあなたのポジションが空いています！\nhttps://rerailoffice-max.github.io/bni-jeanne-chapter/`);
  window.open(`https://line.me/R/share?text=${t}`, '_blank');
}

// タグクリック & Enter
document.querySelectorAll('.tag').forEach(tag => {
  tag.addEventListener('click', () => {
    document.getElementById('searchInput').value = tag.dataset.q;
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    doSearch();
  });
});
document.getElementById('searchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
</script>

</body>
</html>
